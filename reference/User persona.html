<!DOCTYPE html>
<!-- saved from url=(0048)file:///Users/ankitpahuja/Downloads/persona.html -->
<html lang="en" data-theme="dark"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your persona · Hookline</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="./Your persona · Hookline_files/css2" rel="stylesheet">
<style>
  :root{
    --ink:#0b0d17; --panel:#141828; --panel2:#0f1322; --line:#232842;
    --text:#eef1fb; --muted:#8b92b5; --cobalt:#3d5afe; --cobalt-glow:#5b76ff; --lime:#c6f24e; --radius:16px;
  }
  [data-theme="light"]{
    --ink:#f4f5fb; --panel:#ffffff; --panel2:#fbfcff; --line:#e3e6f2;
    --text:#14182b; --muted:#5d6486; --cobalt:#3247e8; --cobalt-glow:#3247e8; --lime:#6b8c12;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;
    transition:background .4s,color .4s;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 24px 80px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:32px;height:32px;border-radius:9px;background:var(--cobalt);display:grid;place-items:center;
    color:#fff;font-family:'Space Grotesk';font-weight:700;box-shadow:0 0 22px #3d5afe66;}
  .brand b{font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:-.02em;}
  .theme-btn{border:1px solid var(--line);background:var(--panel);color:var(--text);width:38px;height:38px;
    border-radius:10px;cursor:pointer;font-size:16px;transition:.2s;}
  .theme-btn:hover{border-color:var(--cobalt);}

  .head h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4vw,40px);letter-spacing:-.03em;
    line-height:1.05;margin-bottom:10px;}
  .head h1 em{font-style:normal;color:var(--lime);}
  .head p{color:var(--muted);font-size:15px;max-width:520px;line-height:1.6;margin-bottom:8px;}

  /* progress */
  .prog{display:flex;gap:8px;margin:26px 0 32px;}
  .prog span{flex:1;height:4px;border-radius:4px;background:var(--line);transition:.3s;}
  .prog span.done{background:var(--cobalt);}

  .group{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px;margin-bottom:18px;}
  .group h3{font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:9px;}
  .group h3 .n{width:22px;height:22px;border-radius:7px;background:var(--cobalt);color:#fff;
    display:grid;place-items:center;font-size:12px;font-weight:700;}

  .field{margin-bottom:18px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:8px;}
  .field .hint{font-weight:400;color:var(--muted);font-size:12.5px;}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);padding:12px 14px;border-radius:11px;font-family:inherit;font-size:14px;transition:.2s;}
  .field textarea{resize:vertical;min-height:84px;line-height:1.5;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--cobalt);
    box-shadow:0 0 0 3px #3d5afe33;}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted);opacity:.6;}

  /* chip selectors */
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:9px 14px;
    border-radius:22px;font-size:13px;font-weight:500;cursor:pointer;transition:.18s;user-select:none;font-family:inherit;}
  .chip:hover{border-color:var(--cobalt);}
  .chip.on{background:var(--cobalt);border-color:var(--cobalt);color:#fff;box-shadow:0 4px 14px #3d5afe44;}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:560px){.two{grid-template-columns:1fr;}}

  .bar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:26px;}
  .skip{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;}
  .skip:hover{color:var(--text);}
  .next{border:0;background:var(--cobalt);color:#fff;padding:13px 28px;border-radius:11px;
    font-family:'Space Grotesk';font-weight:600;font-size:15px;cursor:pointer;transition:.2s;
    box-shadow:0 8px 24px #3d5afe44;}
  .next:hover{background:var(--cobalt-glow);transform:translateY(-1px);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="mark">H</span><b>Hookline</b></div>
      <button class="theme-btn" onclick="toggleTheme()" id="tbtn">☀️</button>
    </header>

    <div class="head">
      <h1>Let's tune Hookline to <em>your</em> voice.</h1>
      <p>These details train every hook, draft, and CTA we write for you. Takes about a minute — you can refine it anytime.</p>
    </div>

    <div class="prog"><span class="done"></span><span class="done"></span><span></span></div>

    <div class="group">
      <h3><span class="n">1</span>Who you are</h3>
      <div class="two">
        <div class="field">
          <label>Your name</label>
          <input type="text" placeholder="Ankit Pahuja">
        </div>
        <div class="field">
          <label>Role / title</label>
          <input type="text" placeholder="Founder, AI SaaS">
        </div>
      </div>
      <div class="field">
        <label>What do you do? <span class="hint">— one line, in plain words</span></label>
        <input type="text" placeholder="I build AI tools that help marketers create content faster.">
      </div>
      <div class="field">
        <label>Industry</label>
        <select>
          <option>AI / SaaS</option><option>Marketing</option><option>Tech &amp; Startups</option>
          <option>Finance</option><option>Consulting</option><option>Coaching / Creator</option><option>Other</option>
        </select>
      </div>
    </div>

    <div class="group">
      <h3><span class="n">2</span>Who you're writing for</h3>
      <div class="field">
        <label>Target audience</label>
        <input type="text" placeholder="Indie founders, marketers, and solo builders in India">
      </div>
      <div class="field">
        <label>What's your main goal? <span class="hint">pick all that apply</span></label>
        <div class="chips" data-multi="">
          <button class="chip">Build authority</button>
          <button class="chip">Generate leads</button>
          <button class="chip">Grow followers</button>
          <button class="chip">Share learnings</button>
          <button class="chip">Hiring</button>
          <button class="chip">Sell a product</button>
        </div>
      </div>
    </div>

    <div class="group">
      <h3><span class="n">3</span>How you sound</h3>
      <div class="field">
        <label>Default tone</label>
        <div class="chips" data-single="">
          <button class="chip on">Conversational</button>
          <button class="chip">Bold &amp; punchy</button>
          <button class="chip">Professional</button>
          <button class="chip">Storytelling</button>
          <button class="chip">Witty</button>
          <button class="chip">Inspirational</button>
        </div>
      </div>
      <div class="field">
        <label>Topics you post about <span class="hint">— comma separated</span></label>
        <input type="text" placeholder="AI agents, building in public, indie SaaS, marketing">
      </div>
      <div class="field">
        <label>Paste a post you love writing <span class="hint">— so we learn your style (optional)</span></label>
        <textarea placeholder="Drop one of your best-performing posts here…"></textarea>
      </div>
    </div>

    <div class="bar">
      <a class="skip" href="file:///Users/ankitpahuja/Downloads/login.html">← Back</a>
      <button class="next" onclick="location.href=&#39;product.html&#39;">Start writing →</button>
    </div>
  </div>

<script>
  function toggleTheme(){
    const h=document.documentElement;
    const n=h.getAttribute('data-theme')==='dark'?'light':'dark';
    h.setAttribute('data-theme',n);
    document.getElementById('tbtn').textContent=n==='dark'?'☀️':'🌙';
  }
  document.querySelectorAll('[data-single] .chip').forEach(c=>{
    c.onclick=()=>{c.parentElement.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');};
  });
  document.querySelectorAll('[data-multi] .chip').forEach(c=>{
    c.onclick=()=>c.classList.toggle('on');
  });
</script>


</body></html>
